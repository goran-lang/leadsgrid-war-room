<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leads Grid — Super Office HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f0f8;
  --hall:#e2e2f0;
  --border:#d0d0e8;
  --purple:#5c48e8;
  --navy:#1a1f5e;
  --teal:#00b4a0;
  --amber:#f59e0b;
  --red:#e84848;
  --green:#16a34a;
  --panel-bg:#ffffff;
  --text:#1a1f5e;
  --text-mid:#6b70a8;
  --text-dim:#a0a4cc;
}
body{background:var(--bg);font-family:'Share Tech Mono',monospace;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;color:var(--text);}

/* TOPBAR */
#topbar{height:46px;background:#fff;border-bottom:2px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;position:relative;z-index:50;box-shadow:0 1px 8px rgba(92,72,232,.07);}
#topbar::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(92,72,232,.45) 40%,rgba(92,72,232,.45) 60%,transparent);}
.tb-logo{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--purple);letter-spacing:.18em;}
.tb-sep{width:1px;height:20px;background:var(--border);}
.tb-tag{font-size:8px;color:var(--text-dim);letter-spacing:.1em;}
.tb-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;background:rgba(92,72,232,.07);border:1px solid rgba(92,72,232,.18);font-size:8px;color:var(--purple);}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px rgba(0,180,160,.8);animation:pulseAnim 2s ease-in-out infinite;}
@keyframes pulseAnim{0%,100%{opacity:1}50%{opacity:.3}}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.tb-stat-val{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--purple);}
.tb-stat-lbl{font-size:6px;color:var(--text-dim);letter-spacing:.08em;display:block;margin-top:1px;}
#clock{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--navy);}

/* SCROLL */
#hq{flex:1;overflow:auto;position:relative;
  background:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(92,72,232,.04) 31px,rgba(92,72,232,.04) 32px),
  repeating-linear-gradient(90deg,transparent,transparent 31px,rgba(92,72,232,.04) 31px,rgba(92,72,232,.04) 32px),var(--bg);}

/* SVG PATHS LAYER */
#path-layer{position:absolute;top:0;left:0;pointer-events:none;z-index:5;}

/* BUILDING */
#building{padding:20px 24px 60px;display:inline-block;min-height:100%;position:relative;z-index:10;}

/* WING */
.wing-label{font-family:'Press Start 2P',monospace;font-size:5px;color:var(--text-dim);letter-spacing:.22em;padding:4px 0 3px 2px;text-transform:uppercase;}
.room-row{display:flex;gap:6px;margin-bottom:6px;}

/* HALLWAY */
.hallway{height:34px;background:var(--hall);margin-bottom:6px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);position:relative;overflow:visible;display:flex;align-items:center;padding:0 14px;}
.hallway::before{content:'';position:absolute;top:15px;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,#d8d8ee 0,#d8d8ee 12px,#e0e0f0 12px,#e0e0f0 24px);}
.hall-id{font-size:5px;color:var(--text-dim);z-index:1;letter-spacing:.2em;font-family:'Press Start 2P',monospace;}

/* ROOM */
.room{width:224px;height:180px;position:relative;border:2px solid var(--border);border-radius:8px;cursor:pointer;overflow:hidden;flex-shrink:0;transition:border-color .2s,box-shadow .2s;box-shadow:0 2px 10px rgba(92,72,232,.07);}
.room:hover{border-color:rgba(92,72,232,.5);box-shadow:0 4px 18px rgba(92,72,232,.16);}
.room.selected{border-color:var(--purple)!important;box-shadow:0 4px 22px rgba(92,72,232,.28)!important;}
.room.lounge,.room.server-room{cursor:default;}
.room.lounge:hover,.room.server-room:hover{border-color:var(--border);box-shadow:0 2px 10px rgba(92,72,232,.07);}

/* floor tile */
.room-floor{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 15px,rgba(92,72,232,.025) 15px,rgba(92,72,232,.025) 16px),repeating-linear-gradient(90deg,transparent,transparent 15px,rgba(92,72,232,.025) 15px,rgba(92,72,232,.025) 16px);}
.room-glow{position:absolute;bottom:0;left:0;right:0;height:55px;pointer-events:none;opacity:.14;}

/* header */
.room-hdr{position:absolute;top:0;left:0;right:0;height:24px;display:flex;align-items:center;padding:0 8px;gap:5px;border-bottom:1px solid rgba(92,72,232,.1);z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(3px);}
.room-id-tag{font-size:5px;color:var(--text-dim);font-family:'Press Start 2P',monospace;}
.room-name-tag{font-size:5.5px;color:var(--navy);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Press Start 2P',monospace;letter-spacing:.03em;}
.room-live{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* PIXEL FURNITURE */
.px{position:absolute;}

/* desk */
.desk{border-radius:3px 3px 2px 2px;}
.desk-leg{position:absolute;bottom:-5px;width:3px;height:5px;background:inherit;border-radius:0 0 1px 1px;opacity:.7;}

/* laptop */
.laptop-base{border-radius:2px;}
.laptop-screen{border-radius:2px 2px 0 0;position:absolute;}
.laptop-screen::before{content:'';position:absolute;inset:2px;border-radius:1px;animation:screenflicker 5s ease-in-out infinite;}
@keyframes screenflicker{0%,85%,100%{opacity:1}92%{opacity:.4}}

/* bookshelf */
.shelf-unit{border-radius:2px;}
.shelf-book{position:absolute;bottom:2px;border-radius:1px 1px 0 0;}

/* plant pot */
.pot{border-radius:0 0 3px 3px;}
.plant-leaves{position:absolute;font-size:14px;bottom:8px;left:50%;transform:translateX(-50%);}

/* coffee cup */
.cup{border-radius:2px 2px 3px 3px;}
.cup-steam{position:absolute;top:-8px;left:50%;transform:translateX(-50%);font-size:8px;color:rgba(150,150,200,.5);animation:steamUp 2.5s ease-in-out infinite;}
@keyframes steamUp{0%,100%{transform:translateX(-50%) translateY(0);opacity:.5}50%{transform:translateX(-50%) translateY(-5px);opacity:0}}

/* whiteboard */
.whiteboard{border-radius:3px;border:2px solid #b0b0d0;}
.wb-line{position:absolute;height:2px;border-radius:1px;background:rgba(92,72,232,.25);}

/* rug */
.rug{border-radius:4px;opacity:.35;}

/* status bar */
.room-status-bar{position:absolute;bottom:0;left:0;right:0;height:20px;background:rgba(255,255,255,.75);border-top:1px solid rgba(92,72,232,.1);display:flex;align-items:center;padding:0 8px;gap:5px;z-index:20;}
.rsb-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.rsb-dot.ok{background:var(--teal);box-shadow:0 0 4px rgba(0,180,160,.7);animation:blink 2.5s ease-in-out infinite;}
.rsb-dot.warn{background:var(--amber);box-shadow:0 0 4px rgba(245,158,11,.7);animation:blink 1.2s ease-in-out infinite;}
.rsb-dot.idle{background:var(--text-dim);}
.rsb-text{font-size:5px;color:var(--text-mid);font-family:'Press Start 2P',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rsb-text.warn{color:var(--amber);}

/* VISITING AGENT (walks between rooms) */
.visitor{position:fixed;font-size:18px;z-index:200;pointer-events:none;transition:left 1.8s cubic-bezier(.4,0,.2,1),top 1.8s cubic-bezier(.4,0,.2,1);filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));}
.visitor-bubble{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);white-space:nowrap;background:#fff;border:1px solid var(--border);border-radius:8px 8px 8px 2px;padding:2px 6px;font-size:5px;color:var(--navy);font-family:'Press Start 2P',monospace;box-shadow:0 2px 8px rgba(0,0,0,.1);opacity:0;transition:opacity .3s;}
.visitor.talking .visitor-bubble{opacity:1;}

/* RESIDENT CHAR */
.char{position:absolute;z-index:15;font-size:17px;animation:charBob 2s ease-in-out infinite;cursor:default;transition:opacity .5s;}
@keyframes charBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.char.away{opacity:.15;}
.char-label{position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:4.5px;color:var(--text-mid);background:rgba(255,255,255,.9);padding:1px 4px;border-radius:2px;border:1px solid var(--border);font-family:'Press Start 2P',monospace;pointer-events:none;z-index:16;}

/* INFO PANEL */
#panel{position:fixed;right:0;top:46px;bottom:0;width:288px;background:var(--panel-bg);border-left:1px solid var(--border);display:none;flex-direction:column;z-index:300;box-shadow:-4px 0 20px rgba(92,72,232,.1);}
#panel.open{display:flex;}
.panel-hdr{padding:16px 16px 12px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(92,72,232,.04),transparent);flex-shrink:0;}
.panel-icon{font-size:24px;margin-bottom:7px;display:block;}
.panel-name{font-family:'Press Start 2P',monospace;font-size:7.5px;color:var(--purple);letter-spacing:.07em;margin-bottom:5px;line-height:1.6;}
.panel-sub{font-size:9px;color:var(--text-mid);line-height:1.65;}
.panel-close{position:absolute;top:12px;right:12px;cursor:pointer;font-size:12px;color:var(--text-dim);width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1px solid var(--border);transition:all .15s;}
.panel-close:hover{color:var(--navy);}
.panel-body{flex:1;overflow-y:auto;padding:12px 16px;}
.panel-body::-webkit-scrollbar{width:3px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);}
.psec{margin-bottom:14px;}
.psec-title{font-family:'Press Start 2P',monospace;font-size:5.5px;color:var(--purple);letter-spacing:.12em;margin-bottom:7px;}
.psec-text{font-size:10px;color:var(--text-mid);line-height:1.75;}
.pstat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.pstat:last-child{border-bottom:none;}
.pstat-l{font-size:9px;color:var(--text-mid);}
.pstat-v{font-family:'Press Start 2P',monospace;font-size:6.5px;color:var(--purple);}
.pcmd{background:rgba(92,72,232,.04);border:1px solid var(--border);border-radius:5px;padding:9px 11px;font-size:9px;color:var(--text-mid);line-height:1.9;word-break:break-all;}
.pcmd span{color:var(--purple);}
</style>
</head>

  return furniture[id] || [];
}

function makeFurnEl(f, room){
  const el = document.createElement(f.tag||'div');
  if(f.cls) el.className = f.cls;
  if(f.s) el.style.cssText = f.s;
  if(f.emoji){ el.style.position='absolute'; el.style.zIndex='3'; el.textContent=f.emoji; }
  if(f.text){ const t=document.createElement('span'); t.textContent=f.text; t.style.cssText='font-size:4px;color:rgba(26,31,94,.6);font-family:monospace;'; el.appendChild(t); }
  if(f.children) f.children.forEach(c=>el.appendChild(makeFurnEl(c)));
  room.appendChild(el);
}

// ── BUILD UI ──────────────────────────────────────────────────────────────────
const roomEls = {}; // id → DOM element
const roomCenters = {}; // id → {x,y} in page coords

function buildUI(){
  const building = document.getElementById('building');
  building.innerHTML = '';
  WINGS.forEach((wing, wi)=>{
    const wLabel = document.createElement('div');
    wLabel.className = 'wing-label';
    wLabel.textContent = wing.label;
    building.appendChild(wLabel);

    const row = document.createElement('div');
    row.className = 'room-row';
    row.id = 'row-'+wi;
    wing.ids.forEach(id=>{
      if(!id || !AGENTS[id]){
        const sp = document.createElement('div');
        sp.style.cssText='width:224px;height:180px;flex-shrink:0;';
        row.appendChild(sp);
        return;
      }
      const card = buildRoomCard(id);
      roomEls[id] = card;
      row.appendChild(card);
    });
    building.appendChild(row);

    if(wi < WINGS.length-1){
      const hall = document.createElement('div');
      hall.className = 'hallway';
      hall.id = 'hall-'+wi;
      const hid = document.createElement('div');
      hid.className = 'hall-id';
      hid.textContent = 'CORRIDOR '+(wi+1);
      hall.appendChild(hid);
      building.appendChild(hall);
    }
  });

  // compute centers after layout
  requestAnimationFrame(()=>{
    const hq = document.getElementById('hq');
    const hqRect = hq.getBoundingClientRect();
    Object.keys(roomEls).forEach(id=>{
      const r = roomEls[id].getBoundingClientRect();
      roomCenters[id] = {
        x: r.left - hqRect.left + hq.scrollLeft + r.width/2,
        y: r.top  - hqRect.top  + hq.scrollTop  + r.height/2
      };
    });
    startVisitors();
  });
}

function buildRoomCard(id){
  const a = AGENTS[id];
  const div = document.createElement('div');
  div.className = 'room';
  div.id = 'room-'+id;
  div.style.background = a.bg;
  div.onclick = ()=>openPanel(id);

  // accent top
  const acc = document.createElement('div');
  acc.style.cssText=`position:absolute;top:0;left:0;right:0;height:3px;border-radius:8px 8px 0 0;background:linear-gradient(90deg,${a.top},transparent);`;
  div.appendChild(acc);

  // floor
  const fl = document.createElement('div'); fl.className='room-floor'; div.appendChild(fl);
  const glow = document.createElement('div'); glow.className='room-glow';
  glow.style.background=`linear-gradient(transparent,${a.top}22)`; div.appendChild(glow);

  // header
  const hdr = document.createElement('div'); hdr.className='room-hdr';
  const dot = document.createElement('div'); dot.className='room-live';
  dot.style.background=a.status==='warn'?'#f59e0b':a.top;
  hdr.innerHTML=`<div class="room-id-tag">${a.tag}</div><div class="room-name-tag">${a.name.toUpperCase()}</div>`;
  hdr.appendChild(dot); div.appendChild(hdr);

  // furniture
  buildFurniture(id, div).forEach(f=>makeFurnEl(f, div));

  // resident character
  const char = document.createElement('div');
  char.className='char'; char.id='char-'+id;
  char.textContent=a.char;
  char.style.cssText='right:16px;bottom:38px;';
  const lbl = document.createElement('div');
  lbl.className='char-label'; lbl.textContent=a.charLabel;
  char.appendChild(lbl); div.appendChild(char);

  // status bar
  const sb = document.createElement('div'); sb.className='room-status-bar';
  const sdot = document.createElement('div'); sdot.className='rsb-dot '+(a.status==='warn'?'warn':'ok');
  const stxt = document.createElement('div'); stxt.className='rsb-text'+(a.status==='warn'?' warn':'');
  stxt.id='sbar-'+id; stxt.textContent=a.statuses[0];
  sb.appendChild(sdot); sb.appendChild(stxt); div.appendChild(sb);

  return div;
}

// ── INFO PANEL ────────────────────────────────────────────────────────────────
let selId=null;
function openPanel(id){
  if(selId) document.getElementById('room-'+selId)?.classList.remove('selected');
  selId=id; document.getElementById('room-'+id).classList.add('selected');
  const a=AGENTS[id];
  document.getElementById('p-icon').textContent=a.icon;
  document.getElementById('p-name').textContent=a.name.toUpperCase();
  document.getElementById('p-sub').textContent=a.tag+' · '+(a.status==='warn'?'⚠ WARNING':'ACTIVE');
  document.getElementById('p-desc').textContent=a.desc;
  document.getElementById('p-stats').innerHTML=a.stats.map(s=>`<div class="pstat"><span class="pstat-l">${s.l}</span><span class="pstat-v">${s.v}</span></div>`).join('');
  document.getElementById('p-cmd').innerHTML=`<span>$ </span>${a.cmd}`;
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  if(selId) document.getElementById('room-'+selId)?.classList.remove('selected');
  selId=null; document.getElementById('panel').classList.remove('open');
}

// ── VISITING SYSTEM ───────────────────────────────────────────────────────────
const VISIT_PAIRS = [
  ['r1','r2'],['r4','r6'],['cmd','r7'],['r3','cmd'],['r11','cmd'],
  ['r1','r12'],['r13','r14'],['r8','r4'],['r5','r6'],['r10','r1'],
  ['r6','r14'],['r12','r1'],['r2','r8'],['r7','cmd'],['r14','r6'],
];

let visitCount = 0;
const activeVisitors = {};

function startVisitors(){
  // start 2-3 visitors with staggered delays
  setTimeout(()=>launchVisitor(), 2000);
  setTimeout(()=>launchVisitor(), 5000);
  setTimeout(()=>launchVisitor(), 8500);
  setInterval(()=>{
    if(Object.keys(activeVisitors).length < 3) launchVisitor();
  }, 6000);
}

function launchVisitor(){
  const ids = Object.keys(AGENTS);
  const fromId = ids[Math.floor(Math.random()*ids.length)];
  let toId;
  // pick a pair involving fromId
  const pairs = VISIT_PAIRS.filter(p=>p[0]===fromId||p[1]===fromId);
  if(pairs.length){
    const pair = pairs[Math.floor(Math.random()*pairs.length)];
    toId = pair[0]===fromId ? pair[1] : pair[0];
  } else {
    do { toId=ids[Math.floor(Math.random()*ids.length)]; } while(toId===fromId);
  }
  if(!roomCenters[fromId]||!roomCenters[toId]) return;
  if(activeVisitors[fromId]) return; // already visiting

  visitCount++;
  document.getElementById('visit-count').textContent=visitCount+' VISITS';

  const msgKey = `${fromId}→${toId}`;
  const revKey = `${toId}→${fromId}`;
  const msg = VISIT_MSGS[msgKey]||VISIT_MSGS[revKey]||'Checking in...';

  // dim the resident
  const resChar = document.getElementById('char-'+fromId);
  if(resChar) resChar.classList.add('away');

  // create visitor element
  const hq = document.getElementById('hq');
  const hqRect = hq.getBoundingClientRect();
  const fromC = roomCenters[fromId];
  const toC = roomCenters[toId];

  const v = document.createElement('div');
  v.className='visitor';
  v.innerHTML=`${AGENTS[fromId].char}<div class="visitor-bubble">${msg}</div>`;
  v.style.cssText=`left:${fromC.x+hqRect.left-9}px;top:${fromC.y+hqRect.top-9}px;`;
  document.body.appendChild(v);
  activeVisitors[fromId]=v;

  // move to destination
  setTimeout(()=>{
    v.style.left=(toC.x+hqRect.left-9)+'px';
    v.style.top=(toC.y+hqRect.top-9)+'px';
  }, 100);

  // show bubble on arrival
  setTimeout(()=>v.classList.add('talking'), 1900);

  // stay, then return
  setTimeout(()=>{
    v.classList.remove('talking');
    v.style.left=(fromC.x+hqRect.left-9)+'px';
    v.style.top=(fromC.y+hqRect.top-9)+'px';
  }, 4500);

  // cleanup
  setTimeout(()=>{
    v.remove();
    delete activeVisitors[fromId];
    if(resChar) resChar.classList.remove('away');
  }, 6400);
}

// ── STATUS ROTATION ───────────────────────────────────────────────────────────
setInterval(()=>{
  Object.entries(AGENTS).forEach(([id,a])=>{
    const idx=Math.floor(Date.now()/4500)%a.statuses.length;
    const el=document.getElementById('sbar-'+id);
    if(el) el.textContent=a.statuses[idx];
  });
},4500);

buildUI();
(()=>{const n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');})();
