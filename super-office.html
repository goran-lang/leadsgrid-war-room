<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leads Grid — Super Office HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f0f8;
  --wall:#e4e4f0;
  --floor-line:rgba(92,72,232,0.06);
  --hall:#e8e8f4;
  --border:#d4d4e8;
  --purple:#5c48e8;
  --purple-soft:#7c6ef0;
  --navy:#1a1f5e;
  --navy-mid:#3a3f7e;
  --teal:#00b4a0;
  --amber:#f59e0b;
  --red:#e84848;
  --green:#16a34a;
  --panel-bg:#ffffff;
  --text:#1a1f5e;
  --text-mid:#6b70a8;
  --text-dim:#a0a4cc;
}

body{background:var(--bg);font-family:'Share Tech Mono',monospace;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;color:var(--text);}

/* ── TOPBAR ─────────────────────────────────── */
#topbar{
  height:46px;background:#ffffff;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:20px;flex-shrink:0;
  position:relative;z-index:50;box-shadow:0 1px 8px rgba(92,72,232,.08);
}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(92,72,232,.4) 40%,rgba(92,72,232,.4) 60%,transparent);}
.tb-logo{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--purple);letter-spacing:.2em;white-space:nowrap;}
.tb-tag{font-size:8px;color:var(--text-dim);letter-spacing:.1em;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:18px;}
.tb-stat{text-align:right;}
.tb-stat-val{font-size:9px;color:var(--purple);display:block;font-family:'Press Start 2P',monospace;}
.tb-stat-lbl{font-size:6px;color:var(--text-dim);display:block;margin-top:1px;letter-spacing:.08em;}
#clock{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--navy);}

/* ── MAIN SCROLL AREA ───────────────────────── */
#hq{
  flex:1;overflow:auto;position:relative;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 31px,var(--floor-line) 31px,var(--floor-line) 32px),
    repeating-linear-gradient(90deg,transparent,transparent 31px,var(--floor-line) 31px,var(--floor-line) 32px),
    var(--bg);
}

/* ── BUILDING ────────────────────────────────── */
#building{padding:24px 28px 60px;min-width:960px;display:inline-block;min-height:100%;}

/* ── WING LABEL ─────────────────────────────── */
.wing-label{
  font-family:'Press Start 2P',monospace;font-size:5px;color:var(--text-dim);
  letter-spacing:.25em;text-transform:uppercase;padding:4px 0 3px 4px;
}

/* ── ROOM ROW ────────────────────────────────── */
.room-row{display:flex;gap:5px;margin-bottom:5px;}

/* ── HALLWAY ─────────────────────────────────── */
.hallway{
  height:32px;background:var(--hall);margin-bottom:5px;
  border-top:1px solid var(--border);border-bottom:1px solid var(--border);
  position:relative;display:flex;align-items:center;padding:0 12px;gap:8px;overflow:hidden;
}
.hallway::before{
  content:'';position:absolute;top:14px;left:0;right:0;height:3px;
  background:repeating-linear-gradient(90deg,#dcdcf0 0,#dcdcf0 10px,#e4e4f4 10px,#e4e4f4 20px);
}
.hall-id{font-size:5px;color:var(--text-dim);z-index:1;letter-spacing:.2em;font-family:'Press Start 2P',monospace;}
.hall-walker{position:absolute;font-size:16px;top:6px;transition:left 2.5s linear;z-index:2;}

/* ── ROOM TILE ─────────────────────────────────── */
.room{
  width:218px;height:162px;position:relative;
  border:2px solid var(--border);border-radius:6px;
  cursor:pointer;overflow:hidden;flex-shrink:0;
  transition:border-color .2s,box-shadow .2s;
  box-shadow:0 2px 8px rgba(92,72,232,.06);
}
.room:hover{border-color:var(--purple-soft);box-shadow:0 4px 18px rgba(92,72,232,.16);}
.room.selected{border-color:var(--purple)!important;box-shadow:0 4px 22px rgba(92,72,232,.28)!important;}
.room.lounge,.room.server-room{cursor:default;}
.room.lounge:hover,.room.server-room:hover{border-color:var(--border);box-shadow:0 2px 8px rgba(92,72,232,.06);}

/* floor tile pattern */
.room-floor{
  position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 15px,rgba(92,72,232,.03) 15px,rgba(92,72,232,.03) 16px),
    repeating-linear-gradient(90deg,transparent,transparent 15px,rgba(92,72,232,.03) 15px,rgba(92,72,232,.03) 16px);
}
.room-glow{position:absolute;bottom:0;left:0;right:0;height:60px;pointer-events:none;opacity:.16;}

/* ── ROOM HEADER ─────────────────────────────── */
.room-hdr{
  position:absolute;top:0;left:0;right:0;height:24px;
  display:flex;align-items:center;padding:0 8px;gap:5px;
  border-bottom:1px solid rgba(92,72,232,.12);z-index:10;
  background:rgba(255,255,255,.82);backdrop-filter:blur(4px);
}
.room-id-tag{font-size:5px;color:var(--text-dim);font-family:'Press Start 2P',monospace;}
.room-name-tag{
  font-size:6px;color:var(--navy);flex:1;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-family:'Press Start 2P',monospace;letter-spacing:.04em;
}
.room-live{width:6px;height:6px;border-radius:50%;flex-shrink:0;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── FURNITURE ────────────────────────────────── */
.furn{position:absolute;}
.furn.desk{border-radius:3px;}
.furn.monitor{border-radius:2px;z-index:3;}
.furn.monitor::before{
  content:'';position:absolute;inset:2px;border-radius:1px;
  animation:screenflicker 4s ease-in-out infinite;
}
@keyframes screenflicker{0%,88%,100%{opacity:1}94%{opacity:.4}}
.furn.chair{border-radius:50% 50% 40% 40%;z-index:2;}
.furn.shelf{border-radius:2px;}
.furn.server-rack{border-radius:3px;}
.furn.server-rack::before{
  content:'';position:absolute;top:6px;left:3px;right:3px;height:3px;
  background:rgba(92,72,232,.6);border-radius:1px;
  box-shadow:0 8px rgba(92,72,232,.5),0 16px rgba(0,180,160,.5),0 24px rgba(245,158,11,.5);
}
.furn.plant-emoji{font-size:15px;position:absolute;z-index:2;}
.furn.steam::after{
  content:'~';position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  font-size:8px;color:rgba(92,72,232,.25);animation:steamrise 2s ease-in-out infinite;
}
@keyframes steamrise{0%,100%{transform:translateX(-50%) translateY(0);opacity:.4}50%{transform:translateX(-50%) translateY(-6px);opacity:0}}

/* ── CHARACTER ────────────────────────────────── */
.char{
  position:absolute;z-index:8;font-size:18px;
  transition:left .8s ease-in-out,top .8s ease-in-out;
  animation:charBob 1.8s ease-in-out infinite;
  cursor:default;
}
@keyframes charBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.char-status{
  position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);
  white-space:nowrap;font-size:5px;color:var(--text-mid);
  background:rgba(255,255,255,.88);padding:1px 4px;border-radius:2px;
  border:1px solid var(--border);font-family:'Press Start 2P',monospace;
  letter-spacing:.02em;pointer-events:none;z-index:9;
}

/* ── STATUS BAR ────────────────────────────────── */
.room-status-bar{
  position:absolute;bottom:0;left:0;right:0;height:20px;
  background:rgba(255,255,255,.7);border-top:1px solid rgba(92,72,232,.1);
  display:flex;align-items:center;padding:0 8px;gap:5px;z-index:10;
}
.rsb-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.rsb-dot.ok{background:var(--teal);box-shadow:0 0 4px rgba(0,180,160,.6);animation:blink 2.5s ease-in-out infinite;}
.rsb-dot.warn{background:var(--amber);box-shadow:0 0 4px rgba(245,158,11,.6);animation:blink 1.2s ease-in-out infinite;}
.rsb-dot.idle{background:var(--text-dim);}
.rsb-text{font-size:5px;color:var(--text-mid);font-family:'Press Start 2P',monospace;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rsb-text.warn{color:var(--amber);}

/* ── INFO PANEL ──────────────────────────────── */
#panel{
  position:fixed;right:0;top:46px;bottom:0;width:290px;
  background:var(--panel-bg);border-left:1px solid var(--border);
  display:none;flex-direction:column;z-index:200;
  box-shadow:-4px 0 20px rgba(92,72,232,.1);
}
#panel.open{display:flex;}
.panel-hdr{
  padding:18px 18px 14px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,rgba(92,72,232,.04),transparent);flex-shrink:0;
}
.panel-icon{font-size:26px;margin-bottom:8px;display:block;}
.panel-name{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--purple);letter-spacing:.08em;margin-bottom:6px;line-height:1.6;}
.panel-sub{font-size:9px;color:var(--text-mid);line-height:1.65;}
.panel-close{
  position:absolute;top:12px;right:12px;cursor:pointer;font-size:12px;
  color:var(--text-dim);width:24px;height:24px;display:flex;align-items:center;
  justify-content:center;border-radius:4px;border:1px solid var(--border);transition:all .15s;
}
.panel-close:hover{color:var(--navy);border-color:var(--border);}
.panel-body{flex:1;overflow-y:auto;padding:14px 18px;}
.panel-body::-webkit-scrollbar{width:3px;}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);}
.psec{margin-bottom:16px;}
.psec-title{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--purple);letter-spacing:.14em;margin-bottom:8px;text-transform:uppercase;}
.psec-text{font-size:10px;color:var(--text-mid);line-height:1.75;}
.pstat{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.pstat:last-child{border-bottom:none;}
.pstat-label{font-size:9px;color:var(--text-mid);}
.pstat-val{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--purple);}
.pcmd{background:rgba(92,72,232,.04);border:1px solid var(--border);border-radius:5px;padding:10px 12px;font-size:9px;color:var(--text-mid);line-height:1.9;word-break:break-all;}
.pcmd span{color:var(--purple);}
</style>
</head>

// Wing layout — 4 columns per row
const WINGS = [
  {label:'WING A — INTELLIGENCE',ids:['r1','r2',null,null]},
  {label:'WING B — EXECUTION',ids:['r4','r5','r6','r7']},
  {label:'WING C — COMMAND & INFRA',ids:['cmd','r3','r8',null]},
  {label:'WING D — SYSTEM',ids:['r10','r11',null,null]},
  {label:'WING E — ADVANCED INTEL',ids:['r12','r13','r14',null]},
];

// ── BUILD ─────────────────────────────────────────────────────
function buildUI(){
  const building = document.getElementById('building');
  building.innerHTML = '';
  WINGS.forEach((wing, wi)=>{
    const wLabel = document.createElement('div');
    wLabel.className = 'wing-label';
    wLabel.textContent = wing.label;
    building.appendChild(wLabel);

    const row = document.createElement('div');
    row.className = 'room-row';
    wing.ids.forEach(id=>{
      if(!id || !AGENTS[id]){
        const sp = document.createElement('div');
        sp.style.cssText = 'width:218px;height:162px;flex-shrink:0;';
        row.appendChild(sp);
        return;
      }
      row.appendChild(buildRoom(id));
    });
    building.appendChild(row);

    if(wi < WINGS.length-1){
      const hall = document.createElement('div');
      hall.className = 'hallway';
      const hallId = document.createElement('div');
      hallId.className = 'hall-id';
      hallId.textContent = 'CORRIDOR '+(wi+1);
      hall.appendChild(hallId);
      ['🏃','🚶','🧑'].forEach((e,i)=>{
        const w = document.createElement('div');
        w.className = 'hall-walker';
        w.textContent = e;
        w.style.left = (60 + i*240)+'px';
        hall.appendChild(w);
        walkLoop(w);
      });
      building.appendChild(hall);
    }
  });
}

function buildRoom(id){
  const a = AGENTS[id];
  const div = document.createElement('div');
  div.className = 'room';
  div.id = 'room-'+id;
  div.onclick = ()=>openPanel(id);
  div.style.background = a.color;

  // floor
  const floor = document.createElement('div');
  floor.className = 'room-floor';
  div.appendChild(floor);

  // glow
  const glow = document.createElement('div');
  glow.className = 'room-glow';
  glow.style.background = `linear-gradient(transparent, ${a.accentTop}22)`;
  div.appendChild(glow);

  // header
  const hdr = document.createElement('div');
  hdr.className = 'room-hdr';
  hdr.style.borderBottomColor = `${a.accentTop}20`;
  const dot = document.createElement('div');
  dot.className = 'room-live';
  dot.style.background = a.status==='warn'?'#f59e0b':a.accentTop;
  hdr.innerHTML = `<div class="room-id-tag">${a.tag}</div><div class="room-name-tag">${a.name.toUpperCase()}</div>`;
  hdr.appendChild(dot);
  div.appendChild(hdr);

  // furniture
  a.furniture.forEach(f=>{
    const el = document.createElement('div');
    el.className = 'furn '+f.cls;
    el.style.cssText = f.s;
    if(f.txt) el.textContent = f.txt;
    if(f.screen){
      const inner = document.createElement('div');
      inner.style.cssText = `position:absolute;inset:2px;border-radius:1px;${f.screen};animation:screenflicker 4s ease-in-out infinite;`;
      el.appendChild(inner);
    }
    div.appendChild(el);
  });

  // character
  const char = document.createElement('div');
  char.className = 'char';
  char.id = 'char-'+id;
  char.textContent = a.char;
  char.style.right = '14px';
  char.style.bottom = '34px';
  const charStatus = document.createElement('div');
  charStatus.className = 'char-status';
  charStatus.id = 'cstatus-'+id;
  charStatus.textContent = a.statuses[0];
  char.appendChild(charStatus);
  div.appendChild(char);

  // status bar
  const sb = document.createElement('div');
  sb.className = 'room-status-bar';
  const sdot = document.createElement('div');
  sdot.className = 'rsb-dot '+(a.status==='warn'?'warn':'ok');
  const stxt = document.createElement('div');
  stxt.className = 'rsb-text'+(a.status==='warn'?' warn':'');
  stxt.id = 'sbar-'+id;
  stxt.textContent = a.statuses[0];
  sb.appendChild(sdot);
  sb.appendChild(stxt);
  div.appendChild(sb);

  return div;
}

// ── PANEL ─────────────────────────────────────────────────────
let selId = null;
function openPanel(id){
  if(selId) document.getElementById('room-'+selId)?.classList.remove('selected');
  selId = id;
  document.getElementById('room-'+id).classList.add('selected');
  const a = AGENTS[id];
  document.getElementById('p-icon').textContent = a.icon;
  document.getElementById('p-name').textContent = a.name.toUpperCase();
  document.getElementById('p-sub').textContent = a.tag + ' · ' + (a.status==='warn'?'⚠ WARNING':'ACTIVE');
  document.getElementById('p-desc').textContent = a.desc;
  document.getElementById('p-stats').innerHTML = a.stats.map(s=>
    `<div class="pstat"><span class="pstat-label">${s.l}</span><span class="pstat-val">${s.v}</span></div>`
  ).join('');
  document.getElementById('p-cmd').innerHTML = `<span>$ </span>${a.cmd}`;
  document.getElementById('panel').classList.add('open');
}
function closePanel(){
  if(selId) document.getElementById('room-'+selId)?.classList.remove('selected');
  selId = null;
  document.getElementById('panel').classList.remove('open');
}

// ── WALKERS ───────────────────────────────────────────────────
function walkLoop(el){
  function step(){
    const x = 40 + Math.random()*700;
    el.style.left = x+'px';
    setTimeout(step, 2500+Math.random()*2500);
  }
  setTimeout(step, Math.random()*2000);
}

// ── STATUS ROTATION ───────────────────────────────────────────
setInterval(()=>{
  Object.entries(AGENTS).forEach(([id,a])=>{
    const idx = Math.floor(Date.now()/4000) % a.statuses.length;
    const txt = a.statuses[idx];
    const sbar = document.getElementById('sbar-'+id);
    const cstatus = document.getElementById('cstatus-'+id);
    if(sbar) sbar.textContent = txt;
    if(cstatus) cstatus.textContent = txt;
  });
}, 4000);

// ── CLOCK ─────────────────────────────────────────────────────
setInterval(()=>{
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0')+':'+
    String(n.getMinutes()).padStart(2,'0')+':'+
    String(n.getSeconds()).padStart(2,'0');
}, 1000);

// ── INIT ──────────────────────────────────────────────────────
buildUI();
(()=>{const n=new Date();document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');})();
</script>
